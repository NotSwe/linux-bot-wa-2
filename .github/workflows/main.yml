name: RDP-BOT-WA-AUTO-LOOP

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]

concurrency:
  group: rdp-wa-loop
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write

    steps:
      - name: "1. Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: "2. Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: "3. Cache NPM"
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: "4. Setup VPN Cloudflare WARP"
        run: |
          echo "Install WARP..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update -q
          sudo apt-get install -y cloudflare-warp

          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect

          sleep 3
          echo "IP:"
          curl -4 ifconfig.me
          echo

      - name: "5. Install Dependencies"
        run: |
          npm install

      - name: "6. Run Bot (5 Jam)"
        run: |
          timeout 5h bash -c '
            while true; do
              echo "Menjalankan Bot..."
              npm start
              echo "Bot berhenti. Restart 5 detik..."
              sleep 5
            done
          ' || true

      - name: "7. Auto-Backup Session & File"
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p storage/session

          # Jangan backup node_modules
          git add -A
          git reset HEAD node_modules 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan file."
          else
            echo "Commit backup..."

            git commit -m "Auto-backup data bot (5 jam) [skip ci]"

            # Hindari konflik jika branch berubah
            git pull --rebase origin main || true

            git push origin HEAD:main
          fi

      - name: "8. Auto-Up (Trigger Siklus Berikutnya)"
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Memicu workflow berikutnya..."
          gh workflow run "${{ github.workflow }}" --ref main
